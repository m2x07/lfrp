<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in to LFRP</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      font-family: Arial, sans-serif;
    ">
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="background-color: #f4f4f4; padding: 40px 0; margin: 1rem 0">
      <tr>
        <td align="center" style="padding: 0rem 0.7rem">
          <table
            role="presentation"
            width="480"
            cellpadding="0"
            cellspacing="0"
            style="
              background-color: #ffffff;
              border-radius: 8px;
              padding: 40px 20px;
            ">
            <tr>
              <td align="center" style="padding-bottom: 24px">
                <h1 style="margin: 0; color: #333333; font-size: 24px">
                  Lost &amp; Found Report Portal
                </h1>
              </td>
            </tr>
            <tr>
              <td style="padding-bottom: 16px">
                <p
                  style="
                    margin: 0;
                    color: #555555;
                    font-size: 16px;
                    line-height: 1.5;
                  ">
                  Click the button below to sign in. This link will expire in 10
                  minutes.
                </p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding: 24px 0">
                <a
                  href="{{MAGIC_LINK_URL}}"
                  style="
                    display: inline-block;
                    background-color: #d42127;
                    color: #ffffff;
                    text-decoration: none;
                    padding: 12px 32px;
                    border-radius: 6px;
                    font-size: 16px;
                    font-weight: bold;
                  ">
                  Sign In
                </a>
              </td>
            </tr>
            <tr>
              <td style="padding-top: 16px">
                <p
                  style="
                    margin: 0;
                    color: #999999;
                    font-size: 13px;
                    line-height: 1.5;
                  ">
                  If you didn't request this email, you can safely ignore it.
                </p>
              </td>
            </tr>
            <tr>
              <td>
                <p
                  style="
                    margin: 0;
                    color: #999999;
                    font-size: 13px;
                    line-height: 1.5;
                  ">
                  Developed by Meet Patel
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
